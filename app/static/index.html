<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .todo-container {
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding: 24px;
        }
        .todo-item {
            transition: all 0.3s ease;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .todo-item:hover {
            transform: translateX(5px);
        }
        .todo-item.completed .todo-title {
            text-decoration: line-through;
            color: #6c757d;
        }
        .todo-title {
            font-weight: 500;
            transition: color 0.3s;
        }
        .todo-description {
            font-size: 0.9em;
            color: #6c757d;
        }
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-weight: 500;
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        .badge-status {
            font-size: 0.75em;
            padding: 6px 12px;
            border-radius: 20px;
        }
        .todo-actions .btn {
            padding: 4px 10px;
            font-size: 0.9em;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container todo-container">
        <div class="card">
            <div class="card-header">
                <h2 class="mb-0 text-center">
                    <i class="bi bi-check2-square me-2"></i>
                    TODO Manager
                </h2>
            </div>
            <div class="card-body p-4">
                <!-- Форма добавления -->
                <form id="todoForm" class="mb-4">
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg" id="titleInput" 
                               placeholder="Что нужно сделать?" required>
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control" id="descriptionInput" rows="2" 
                                  placeholder="Описание (необязательно)"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-add w-100">
                        <i class="bi bi-plus-lg me-2"></i>Добавить задачу
                    </button>
                </form>

                <!-- Фильтры -->
                <div class="d-flex justify-content-center gap-2 mb-4">
                    <button class="btn btn-outline-secondary btn-sm filter-btn active" data-filter="all">
                        Все
                    </button>
                    <button class="btn btn-outline-success btn-sm filter-btn" data-filter="active">
                        Активные
                    </button>
                    <button class="btn btn-outline-secondary btn-sm filter-btn" data-filter="completed">
                        Завершённые
                    </button>
                </div>

                <!-- Список задач -->
                <div id="todoList">
                    <div class="loading">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Загрузка...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Редактировать задачу</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label">Название</label>
                        <input type="text" class="form-control" id="editTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" id="editDescription" rows="3"></textarea>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="editCompleted">
                        <label class="form-check-label">Выполнено</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-primary" id="saveEditBtn">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
